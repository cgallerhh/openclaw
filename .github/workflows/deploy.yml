name: Deploy OpenClaw to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,TELEGRAM_API_KEY,TELEGRAM_CHAT_ID
          script: |
            cd /home/user/openclaw
            git pull origin main
            printf "ANTHROPIC_API_KEY=%s\nTELEGRAM_API_KEY=%s\nTELEGRAM_CHAT_ID=%s\n" \
              "$ANTHROPIC_API_KEY" "$TELEGRAM_API_KEY" "$TELEGRAM_CHAT_ID" > .env
            chmod 600 .env
            docker compose up -d --build
            docker compose ps
