name: Deploy OpenClaw to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: OPENAI_API_KEY,TELEGRAM_API_KEY,TELEGRAM_CHAT_ID,GMAIL_USER,GMAIL_APP_PASSWORD,RECIPIENT_EMAIL
          script: |
            cd /home/user/openclaw
            git pull origin main
            printf "OPENAI_API_KEY=%s\nTELEGRAM_API_KEY=%s\nTELEGRAM_CHAT_ID=%s\nGMAIL_USER=%s\nGMAIL_APP_PASSWORD=%s\nRECIPIENT_EMAIL=%s\n" \
              "$OPENAI_API_KEY" "$TELEGRAM_API_KEY" "$TELEGRAM_CHAT_ID" \
              "$GMAIL_USER" "$GMAIL_APP_PASSWORD" "$RECIPIENT_EMAIL" > .env
            chmod 600 .env
            docker compose up -d --build
            docker compose ps
