name: Deploy OpenClaw to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: openclaw
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/openclaw
            git pull origin main
            docker compose up -d --build
            docker compose ps
