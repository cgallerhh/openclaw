services:
  openclaw:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_API_KEY=${TELEGRAM_API_KEY}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - openclaw-data:/root/.openclaw

volumes:
  openclaw-data:
